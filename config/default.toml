# ModelSentry — default configuration
# Copy to config/local.toml and edit before running.
# All paths are relative to the working directory unless absolute.

[server]
host = "127.0.0.1"
port = 7740
# Request timeout in seconds.
timeout_secs = 30
# Allowed CORS origin. Set to your frontend URL.
# Use "*" to allow all origins (not recommended for production).
cors_origin = "http://localhost:5173"

[vault]
# Encrypted API key store. Created on first run.
path = ".modelsentry/vault"

[database]
# redb embedded database file.
path = ".modelsentry/store.redb"

[scheduler]
# Default polling interval for probes that use EveryMinutes schedule.
default_interval_minutes = 60
# Maximum probe runs executing at once across ALL probes. Each run may itself
# fan out several prompts, so this bounds total outbound load on a provider and
# stops a fleet of probes (or a restart that finds several overdue) from
# stampeding it. Must be >= 1. Next-run times are persisted, so on restart an
# overdue probe runs once to catch up, then resumes its normal cadence.
max_concurrent_runs = 8

[alerts]
# Drift detection is a calibrated statistical test (see
# docs/DRIFT_DETECTION_METHODOLOGY.md). You choose a target false-positive rate
# instead of tuning opaque thresholds.
#
# target_fpr: a run alerts when its calibrated combined p-value falls below this.
# It IS your per-run false-positive rate: 0.01 ≈ one false alarm per ~100 stable
# runs. Lower = fewer, stronger alerts. Must be in the open interval (0, 1). The
# gate auto-raises its permutation count so it can always resolve this value;
# broad (model-wide) drift resolves it easily, while detecting a *single* drifted
# prompt needs a baseline cloud of ≳ 1/target_fpr runs (see permutations below
# and docs/DRIFT_DETECTION_METHODOLOGY.md §8).
target_fpr = 0.01
# Allow alert webhooks to target private/loopback/link-local addresses.
# Keep false unless your webhook receiver is on a trusted internal network —
# leaving it false blocks SSRF to cloud-metadata endpoints and localhost.
allow_private_webhook_targets = false
# How many recent successful runs to aggregate into a baseline capture. More
# runs ⇒ richer per-prompt output-embedding clouds ⇒ more statistical power to
# detect subtle drift. With only 1 run the test falls back to a lower-power
# pooled mode.
baseline_capture_runs = 20
# Permutations for the pooled-fallback two-sample test (higher = more precise
# p-value, slightly slower).
permutations = 200
# Completions sampled per prompt per run. With >= 2, each prompt gets a
# within-run distribution and the drift test is no longer rank-limited to
# 1/(k+1) for a single drifted prompt (it resolves to 1/(permutations+1)). Set
# to 1 to halve/third the provider-call cost at the price of that resolution.
samples_per_prompt = 3
# Per-rule alert de-duplication / cooldown window, in seconds. target_fpr is a
# PER-RUN rate, so without a cooldown a persistently-drifted or chronically-noisy
# probe would re-alert on every scheduled run. Within this window a rule that
# keeps firing is de-duplicated: the run is still recorded, but no new
# notification is sent. Default 3600 (one hour). Set 0 to disable.
cooldown_secs = 3600

# --------------------------------------------------------------------------
# Sequential control (rolling-window alpha-spending). Optional — omit this
# whole block to disable it (the default): every run is then tested
# independently at target_fpr, so the EXPECTED COUNT of false alarms grows with
# the number of scheduled runs (an hourly probe at FPR 0.01 expects ~7 false
# alarms/month even with no drift). With this block, each rule spends its
# testing level from a per-window budget on every look (debit-on-look); once the
# rolling spend reaches `alpha_budget` the rule is silenced until older spends
# age out. This bounds the expected false alarms per rule per window — at the
# cost of per-look sensitivity, so size `alpha_budget` against the probe cadence
# (≈ alpha_budget / target_fpr full-sensitivity looks per window). Orthogonal to
# cooldown_secs (cooldown de-dups bursts; this bounds the long-run count).
# --------------------------------------------------------------------------
# [alerts.sequential]
# window_secs = 2592000   # rolling window; 2592000 = 30 days
# alpha_budget = 0.05     # expected false alarms tolerated per rule per window; 0 disables

# --------------------------------------------------------------------------
# Email alert channel (SMTP). Optional — omit this whole block to log-and-skip
# email alerts. The password is stored in the encrypted vault under the 'smtp'
# key (e.g. `modelsentry vault set smtp`), never in this file.
# --------------------------------------------------------------------------
# [alerts.smtp]
# host = "smtp.example.com"
# port = 587                       # 587 = STARTTLS submission, 465 = implicit TLS
# from = "ModelSentry <alerts@example.com>"
# username = "alerts@example.com"  # omit (with no vault password) for an open relay
# security = "start_tls"           # "start_tls" (default) | "tls" | "none"

# --------------------------------------------------------------------------
# Provider defaults — override model names, base URLs, and token limits.
# API keys are stored in the encrypted vault, not in this file.
# --------------------------------------------------------------------------

[providers.openai]
# Current OpenAI chat models (June 2026): gpt-5.5 (flagship), gpt-5.4,
# gpt-5.4-mini, gpt-5.4-nano (cheapest). gpt-4o is deprecated.
model = "gpt-5.4"
# Embeddings: text-embedding-3-small (1536 dims) or text-embedding-3-large
# (3072 dims). embedding_dim MUST match the model's native output dimension.
# Switching models invalidates existing baselines: drift detection will skip
# affected probes and log a "re-capture the baseline" warning until you capture
# a fresh baseline under the new model (`modelsentry baseline capture <id>`).
embedding_model = "text-embedding-3-small"
embedding_dim = 1536
base_url = "https://api.openai.com"
max_tokens = 1024

[providers.anthropic]
# Current Claude model IDs (June 2026): claude-opus-4-8, claude-sonnet-4-6, claude-haiku-4-5.
model = "claude-sonnet-4-6"
base_url = "https://api.anthropic.com"
api_version = "2023-06-01"
max_tokens = 1024

[providers.ollama]
model = "llama3"
base_url = "http://localhost:11434"

[providers.azure]
# Azure OpenAI resource endpoint (no trailing slash). Required for Azure probes.
# The per-probe chat deployment is chosen when creating the probe; this block
# holds the deployment-wide infrastructure settings. The API key is stored in
# the encrypted vault under the 'azure' provider id, not here.
endpoint = ""
# Embedding deployment used for drift detection. Leave unset to run Azure probes
# completions-only (no drift). embedding_dim MUST match the deployment's output
# dimension (text-embedding-3-small = 1536, text-embedding-3-large = 3072).
# embedding_deployment = "text-embedding-3-small"
embedding_dim = 1536
# REST API version. See Azure OpenAI docs for supported values.
api_version = "2024-10-21"
max_tokens = 1024

# --------------------------------------------------------------------------
# Authentication — protect API endpoints with bearer-token / X-Api-Key auth.
# --------------------------------------------------------------------------

[auth]
# Set to true to require authentication on all /api/ endpoints.
enabled = false
# List of accepted API keys (bearer tokens). At least one required when enabled.
# api_keys = ["your-secret-key"]
