name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create GitHub Releases and upload assets

jobs:
  # ── Build frontend (shared across all target platforms) ─────────────────────
  build-web:
    name: Build web dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

      # Upload the SvelteKit static output so Rust build steps can embed it
      - uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: web/build/
          retention-days: 1

  # ── Build Rust binaries ──────────────────────────────────────────────────────
  build-rust:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: build-web

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_suffix: ""

          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            binary_suffix: ""

    steps:
      - uses: actions/checkout@v4

      # Download the pre-built frontend so it is embedded by include_dir!
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web/build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build daemon
        run: >
          cargo build
          --release
          --target ${{ matrix.target }}
          -p modelsentry-daemon

      - name: Build CLI
        run: >
          cargo build
          --release
          --target ${{ matrix.target }}
          -p modelsentry-cli

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCH="${{ matrix.name }}"
          STAGING="modelsentry-${TAG}-${ARCH}"
          mkdir -p "dist/${STAGING}"

          cp "target/${{ matrix.target }}/release/modelsentry-daemon${{ matrix.binary_suffix }}" \
             "dist/${STAGING}/"
          cp "target/${{ matrix.target }}/release/modelsentry${{ matrix.binary_suffix }}" \
             "dist/${STAGING}/"
          cp README.md LICENSE config/default.toml "dist/${STAGING}/"

          cd dist
          tar -czf "${STAGING}.tar.gz" "${STAGING}"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.name }}
          path: dist/*.tar.gz
          retention-days: 1

  # ── Publish GitHub Release ───────────────────────────────────────────────────
  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build-rust

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
